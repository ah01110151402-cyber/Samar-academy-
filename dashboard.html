<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المواد - أكاديمية سمر</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { background: white; width: 100%; max-width: 600px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; font-size: 22px; }
        #welcomeMsg { color: #2d3436; margin-top: 10px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 600px; }
        .card { 
            background: white; padding: 25px; border-radius: 15px; text-decoration: none; 
            display: flex; align-items: center; justify-content: space-between;
            transition: 0.3s; border: 2px solid transparent; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .card-info { display: flex; align-items: center; gap: 15px; }
        .card-icon { font-size: 30px; }
        .card-title { font-size: 18px; font-weight: bold; color: #2d3436; }
        .arrow { color: var(--primary); font-weight: bold; }
        .disabled { opacity: 0.6; cursor: not-allowed; background: #dfe6e9; }
    </style>
</head>
<body>

    <div class="header">
        <h1>مرحباً بك في أكاديمية سمر 🌟</h1>
        <p id="welcomeMsg">جاري التحميل...</p>
    </div>

    <div class="grid">
        <a href="science_lessons.html" class="card">
            <div class="card-info">
                <span class="card-icon">🔬</span>
                <span class="card-title">مادة العلوم</span>
            </div>
            <span class="arrow">⬅️</span>
        </a>

        <a href="#" class="card disabled" onclick="alert('قريباً إن شاء الله!')">
            <div class="card-info">
                <span class="card-icon">🧮</span>
                <span class="card-title">مادة الرياضيات</span>
            </div>
            <span class="arrow">🔒</span>
        </a>

        <a href="#" class="card disabled" onclick="alert('قريباً إن شاء الله!')">
            <div class="card-info">
                <span class="card-icon">📖</span>
                <span class="card-title">اللغة العربية</span>
            </div>
            <span class="arrow">🔒</span>
        </a>
    </div>

    <script>
        // استعادة اسم الطالب من الذاكرة لإظهار الترحيب
        const studentName = localStorage.getItem('studentName');
        if (studentName) {
            document.getElementById('welcomeMsg').innerText = "يا بطل: " + studentName + ".. اختر المادة لتبدأ";
        } else {
            // لو دخل الصفحة من غير تسجيل يرجعه لصفحة الـ Login
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
