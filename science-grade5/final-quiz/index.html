<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌍 اختبار العلوم الشامل - الدروس الخمسة</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1b2a;
      --surface: #1a2f45;
      --card: #1e3a52;
      --border: rgba(255,255,255,0.08);
      --text: #e8f4f8;
      --muted: rgba(255,255,255,0.55);
      --easy: #2ecc71; --easy-bg: rgba(46,204,113,0.12);
      --medium: #f39c12; --medium-bg: rgba(243,156,18,0.12);
      --hard: #e74c3c; --hard-bg: rgba(231,76,60,0.12);
      --advanced: #9b59b6; --advanced-bg: rgba(155,89,182,0.12);
      --gold: #FFD700;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
    }

    /* ===== LAYOUT ===== */
    .quiz-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }

    /* ===== LEVEL TABS ===== */
    .level-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 24px;
    }
    .level-tab {
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .level-tab.easy    { background: var(--easy-bg);    color: var(--easy);    border-color: rgba(46,204,113,0.3); }
    .level-tab.medium  { background: var(--medium-bg);  color: var(--medium);  border-color: rgba(243,156,18,0.3); }
    .level-tab.hard    { background: var(--hard-bg);    color: var(--hard);    border-color: rgba(231,76,60,0.3); }
    .level-tab.advanced{ background: var(--advanced-bg);color: var(--advanced);border-color: rgba(155,89,182,0.3); }
    .level-tab.active  { transform: scale(1.06); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .level-tab.easy.active    { background: var(--easy);    color: #0d1b2a; border-color: var(--easy); }
    .level-tab.medium.active  { background: var(--medium);  color: #0d1b2a; border-color: var(--medium); }
    .level-tab.hard.active    { background: var(--hard);    color: white;   border-color: var(--hard); }
    .level-tab.advanced.active{ background: var(--advanced);color: white;   border-color: var(--advanced); }
    .tab-badge {
      background: rgba(0,0,0,0.25);
      border-radius: 50px;
      font-size: 0.75rem;
      padding: 1px 7px;
    }

    /* ===== ACHIEVEMENT BANNER (appears when level complete) ===== */
    .achievement-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 500;
      justify-content: center;
      align-items: center;
      animation: fadeInOverlay 0.3s ease;
    }
    .achievement-overlay.show { display: flex; }
    @keyframes fadeInOverlay { from{opacity:0} to{opacity:1} }
    .achievement-card {
      background: linear-gradient(135deg, #1a2f45, #0d1b2a);
      border-radius: 30px;
      padding: 3rem 3.5rem;
      text-align: center;
      max-width: 440px;
      width: 90%;
      border: 2px solid rgba(255,215,0,0.3);
      box-shadow: 0 0 80px rgba(255,215,0,0.2);
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
    }
    @keyframes popIn { from{transform:scale(0.6) translateY(30px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
    .ach-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(255,215,0,0.08), transparent 70%);
      pointer-events: none;
    }
    .ach-medal {
      font-size: 5.5rem;
      margin-bottom: 0.5rem;
      display: block;
      filter: drop-shadow(0 0 20px rgba(255,215,0,0.6));
      animation: medalSpin 0.8s ease;
    }
    @keyframes medalSpin { from{transform:rotateY(90deg) scale(0.5)} to{transform:rotateY(0) scale(1)} }
    .ach-label {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
      opacity: 0.8;
    }
    .ach-title {
      font-size: 1.7rem;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .ach-score-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 12px auto;
      font-weight: 900;
      border: 4px solid;
    }
    .ach-score-ring .big { font-size: 1.6rem; line-height: 1; }
    .ach-score-ring .sm  { font-size: 0.8rem; opacity: 0.7; }
    .ach-msg {
      font-size: 1rem;
      color: var(--muted);
      margin: 12px 0 20px;
      line-height: 1.7;
    }
    .ach-continue-btn {
      background: var(--gold);
      color: #0d1b2a;
      border: none;
      padding: 0.9rem 2.5rem;
      border-radius: 50px;
      font-family: 'Tajawal', sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      transition: 0.3s;
    }
    .ach-continue-btn:hover { transform: scale(1.05); background: #ffea00; }

    /* ===== QUIZ HEADER ===== */
    .quiz-header {
      text-align: center;
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .quiz-title {
      font-size: 1.6rem;
      font-weight: 900;
      background: linear-gradient(135deg, #4fc3f7, #81d4fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .quiz-sub { font-size: 0.9rem; color: var(--muted); margin-top: 4px; }

    /* ===== STATUS BAR ===== */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .q-counter {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }
    .progress-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 50px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #2a9d8f, #2ecc71);
      border-radius: 50px;
      transition: width 0.4s ease;
    }
    .timer-display {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 1rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      min-width: 60px;
      text-align: center;
      transition: background 0.3s;
    }
    .timer-display.urgent { background: rgba(231,76,60,0.25); color: #e74c3c; border-color: #e74c3c; animation: pulse 0.6s infinite alternate; }
    @keyframes pulse { from{opacity:1} to{opacity:0.6} }

    /* ===== QUESTION CARD ===== */
    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 28px 20px;
      margin-bottom: 16px;
    }
    .q-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .lesson-badge {
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .lb-1 { background: rgba(74,144,226,0.2); color: #74b9ff; }
    .lb-2 { background: rgba(46,204,113,0.2); color: #55efc4; }
    .lb-3 { background: rgba(253,203,110,0.2); color: #fdcb6e; }
    .lb-4 { background: rgba(231,76,60,0.2); color: #ff7675; }
    .lb-5 { background: rgba(155,89,182,0.2); color: #a29bfe; }
    .level-badge {
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .lvl-easy     { background: var(--easy-bg);    color: var(--easy); }
    .lvl-medium   { background: var(--medium-bg);  color: var(--medium); }
    .lvl-hard     { background: var(--hard-bg);    color: var(--hard); }
    .lvl-advanced { background: var(--advanced-bg);color: var(--advanced); }
    .q-num { font-size: 0.82rem; color: var(--muted); margin-right: auto; }

    .question-text {
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    /* ===== OPTIONS ===== */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .opt-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95rem;
    }
    .opt-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }
    .opt-item.locked { cursor: not-allowed; }
    .opt-prefix {
      width: 30px; height: 30px;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.9rem; flex-shrink: 0;
    }
    .opt-item.correct-ans {
      background: rgba(46,204,113,0.15);
      border-color: var(--easy);
    }
    .opt-item.correct-ans .opt-prefix { background: var(--easy); color: #0d1b2a; }
    .opt-item.correct-ans .opt-text { color: #a8f0c6; }
    .opt-item.wrong-ans {
      background: rgba(231,76,60,0.12);
      border-color: var(--hard);
    }
    .opt-item.wrong-ans .opt-prefix { background: var(--hard); color: white; }
    .opt-item.highlight-correct {
      border-color: var(--easy);
      background: rgba(46,204,113,0.08);
      animation: highlightPulse 0.6s ease;
    }
    @keyframes highlightPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }

    /* ===== EXPLANATION ===== */
    .explanation-box {
      display: none;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-right: 4px solid #2a9d8f;
      border-radius: 12px;
      padding: 14px 16px;
      margin-top: 14px;
      font-size: 0.95rem;
      line-height: 1.7;
      gap: 8px;
      align-items: flex-start;
    }
    .explanation-box.show { display: flex; }
    .exp-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }
    .exp-text { color: rgba(255,255,255,0.75); }

    /* ===== NAV ===== */
    .nav-row {
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }
    .btn {
      padding: 12px 28px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover:not(:disabled) { background: rgba(255,255,255,0.12); transform: translateY(-2px); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .btn-primary { background: linear-gradient(135deg, #2a9d8f, #1abc9c); border-color: transparent; color: white; }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(42,157,143,0.4); }
    .btn-finish { background: linear-gradient(135deg, #f39c12, #e67e22); border-color: transparent; color: white; }
    .btn-finish:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(243,156,18,0.4); }
    .foot-note { text-align: center; font-size: 0.82rem; color: var(--muted); margin-top: 10px; }

    /* ===== LEVEL SECTION HEADER ===== */
    .level-section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-radius: 16px;
      margin-bottom: 16px;
      margin-top: 8px;
    }
    .lsh-easy     { background: var(--easy-bg);    border: 1.5px solid rgba(46,204,113,0.25); }
    .lsh-medium   { background: var(--medium-bg);  border: 1.5px solid rgba(243,156,18,0.25); }
    .lsh-hard     { background: var(--hard-bg);    border: 1.5px solid rgba(231,76,60,0.25); }
    .lsh-advanced { background: var(--advanced-bg);border: 1.5px solid rgba(155,89,182,0.25); }
    .lsh-icon { font-size: 1.8rem; }
    .lsh-info { flex: 1; }
    .lsh-name { font-size: 1.1rem; font-weight: 800; }
    .lsh-easy   .lsh-name { color: var(--easy); }
    .lsh-medium .lsh-name { color: var(--medium); }
    .lsh-hard   .lsh-name { color: var(--hard); }
    .lsh-advanced .lsh-name { color: var(--advanced); }
    .lsh-desc { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }
    .lsh-progress-wrap { text-align: left; }
    .lsh-progress-num { font-size: 1.2rem; font-weight: 900; }
    .lsh-progress-lbl { font-size: 0.75rem; color: var(--muted); }

    /* ===== REPORT ===== */
    .report-wrap {
      padding: 16px 0;
    }
    .report-title {
      font-size: 1.8rem;
      font-weight: 900;
      text-align: center;
      margin-bottom: 4px;
    }
    .report-sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    .score-donut-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
    .score-donut {
      width: 140px; height: 140px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .score-donut::before {
      content: '';
      position: absolute;
      inset: 12px;
      background: var(--bg);
      border-radius: 50%;
    }
    .score-inner {
      position: relative;
      z-index: 1;
      display: flex; flex-direction: column; align-items: center;
    }
    .score-num { font-size: 2.4rem; font-weight: 900; line-height: 1; }
    .score-denom { font-size: 0.9rem; color: var(--muted); }
    .level-tag { display: inline-block; padding: 6px 20px; border-radius: 50px; font-size: 1rem; font-weight: 700; margin: 8px auto; }
    .lt-pro  { background: linear-gradient(135deg,#f6d365,#fda085); color: #0d1b2a; }
    .lt-adv  { background: linear-gradient(135deg,#43e97b,#38f9d7); color: #0d1b2a; }
    .lt-med  { background: linear-gradient(135deg,#4facfe,#00f2fe); color: #0d1b2a; }
    .lt-beg  { background: linear-gradient(135deg,#a18cd1,#fbc2eb); color: #0d1b2a; }
    .encourage { color: var(--muted); font-size: 0.95rem; text-align: center; margin: 12px 0 28px; line-height: 1.7; }

    /* Level breakdown in report */
    .level-report-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .lvl-report-card {
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      border: 1.5px solid;
    }
    .lvl-report-card.easy     { background: var(--easy-bg);    border-color: rgba(46,204,113,0.3);  }
    .lvl-report-card.medium   { background: var(--medium-bg);  border-color: rgba(243,156,18,0.3);  }
    .lvl-report-card.hard     { background: var(--hard-bg);    border-color: rgba(231,76,60,0.3);   }
    .lvl-report-card.advanced { background: var(--advanced-bg);border-color: rgba(155,89,182,0.3);  }
    .lvrc-medal { font-size: 2rem; }
    .lvrc-name { font-size: 0.85rem; font-weight: 700; margin: 4px 0 6px; }
    .lvrc-name.easy     { color: var(--easy); }
    .lvrc-name.medium   { color: var(--medium); }
    .lvrc-name.hard     { color: var(--hard); }
    .lvrc-name.advanced { color: var(--advanced); }
    .lvrc-score { font-size: 1.5rem; font-weight: 900; }
    .lvrc-total { font-size: 0.8rem; color: var(--muted); }
    .lvrc-bar-bg { height: 6px; background: rgba(255,255,255,0.08); border-radius: 50px; overflow: hidden; margin-top: 8px; }
    .lvrc-bar { height: 100%; border-radius: 50px; transition: width 1.2s ease; }
    .easy-bar     { background: var(--easy); }
    .medium-bar   { background: var(--medium); }
    .hard-bar     { background: var(--hard); }
    .advanced-bar { background: var(--advanced); }

    /* Lesson breakdown */
    .breakdown-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 12px; }
    .lesson-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      margin-bottom: 8px;
    }
    .lr-name { font-size: 0.9rem; color: var(--muted); flex: 1; }
    .lr-score { font-weight: 800; font-size: 0.95rem; min-width: 50px; }
    .lr-bar-bg { flex: 2; height: 8px; background: rgba(255,255,255,0.08); border-radius: 50px; overflow: hidden; }
    .lr-bar-fill { height: 100%; border-radius: 50px; }

    /* Wrong list */
    .wrong-list-title { font-size: 1rem; font-weight: 800; margin: 20px 0 10px; color: #e74c3c; }
    .wrong-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-right: 4px solid #e74c3c;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .wi-q { font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; }
    .wi-ans { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; font-size: 0.88rem; margin-bottom: 6px; }
    .wi-wrong-tag { color: #e74c3c; font-weight: 700; }
    .wi-right-tag { color: var(--easy); font-weight: 700; }
    .wi-detail { font-size: 0.88rem; color: var(--muted); line-height: 1.6; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 8px; margin-top: 4px; }

    .restart-btn {
      display: block;
      margin: 24px auto 0;
      background: linear-gradient(135deg, #2a9d8f, #1abc9c);
      color: white;
      border: none;
      padding: 14px 40px;
      border-radius: 50px;
      font-family: 'Tajawal', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 24px rgba(42,157,143,0.35);
    }
    .restart-btn:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(42,157,143,0.55); }

    /* ===== SIDEBAR ACHIEVEMENTS BAR ===== */
    .achievements-sidebar {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 100;
    }
    .ach-pip {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      border: 2px solid rgba(255,255,255,0.1);
      background: var(--surface);
      transition: 0.3s;
      cursor: default;
      position: relative;
    }
    .ach-pip.earned {
      border-color: var(--gold);
      box-shadow: 0 0 14px rgba(255,215,0,0.4);
      animation: pipEarn 0.5s ease;
    }
    @keyframes pipEarn { from{transform:scale(0.5) rotate(-30deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
    .ach-pip.locked { opacity: 0.3; filter: grayscale(1); }
    .ach-pip-tooltip {
      position: absolute;
      left: 56px;
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.78rem;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .ach-pip:hover .ach-pip-tooltip { opacity: 1; }

    @media (max-width: 640px) {
      .options-grid { grid-template-columns: 1fr; }
      .level-report-grid { grid-template-columns: 1fr 1fr; }
      .question-text { font-size: 1.1rem; }
      .achievements-sidebar { bottom: 10px; left: 10px; }
      .ach-pip { width: 40px; height: 40px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<!-- Achievement overlay (shown when level complete) -->
<div class="achievement-overlay" id="achOverlay">
  <div class="achievement-card">
    <div class="ach-glow"></div>
    <span class="ach-medal" id="achMedal">🏅</span>
    <div class="ach-label">إنجاز مفتوح!</div>
    <h2 class="ach-title" id="achTitle">أتممت المستوى السهل!</h2>
    <div class="ach-score-ring" id="achRing">
      <span class="big" id="achScoreBig">18</span>
      <span class="sm" id="achScoreSm">من 20</span>
    </div>
    <p class="ach-msg" id="achMsg">أداء رائع!</p>
    <button class="ach-continue-btn" id="achContinueBtn">التالي ▶</button>
  </div>

      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + duration + 0.05);
    } catch(e) {}
  }

  function playCorrect() {
    playTone(523, 'sine', 0.12, 0.4);
    playTone(659, 'sine', 0.12, 0.4, 0.12);
    playTone(784, 'sine', 0.2,  0.4, 0.24);
  }

  function playWrong() {
    playTone(220, 'sawtooth', 0.15, 0.3);
    playTone(185, 'sawtooth', 0.25, 0.3, 0.12);
  }

  function playTimerUrgent() {
    playTone(880, 'square', 0.06, 0.15);
  }

  function playAchievement(level) {
    // Fanfare melody based on level
    const melodies = {
      easy:     [[523,0],[659,0.1],[784,0.2],[1047,0.35]],
      medium:   [[587,0],[740,0.1],[880,0.2],[1175,0.35],[880,0.55]],
      hard:     [[698,0],[880,0.1],[1047,0.2],[1319,0.35],[1047,0.5],[1319,0.65]],
      advanced: [[784,0],[988,0.08],[1175,0.16],[1568,0.26],[1319,0.42],[1568,0.56],[1976,0.72]],
    };
    const mel = melodies[level] || melodies.easy;
    mel.forEach(([freq, delay]) => playTone(freq, 'sine', 0.25, 0.5, delay));
  }

  function playFinish() {
    const notes = [523,659,784,1047,784,880,1047,1319];
    notes.forEach((f, i) => playTone(f, 'sine', 0.2, 0.5, i * 0.12));
  }

  // =============================================================
  // TIMER
  // =============================================================
  function stopTimer() {
    if (timerInt) { clearInterval(timerInt); timerInt = null; }
  }

  function startTimer(level) {
    stopTimer();
    timeLeft = LEVEL_META[level].timeLimit;
    renderTimer();
    timerInt = setInterval(() => {
      timeLeft--;
      renderTimer();
      if (timeLeft === 10) playTimerUrgent();
      if (timeLeft <= 0) {
        stopTimer();
        if (!answered[currentIdx]) {
          userAnswers[currentIdx] = -1;
          answered[currentIdx] = true;
          playWrong();
          showFeedback(currentIdx, -1);
          updateProgress();
        }
      }
    }, 1000);
  }

  function renderTimer() {
    const el = document.getElementById('timerVal');
    if (!el) return;
    el.textContent = timeLeft + ' ث';
    const box = document.getElementById('timerBox');
    if (box) box.className = 'timer-display' + (timeLeft <= 10 ? ' urgent' : '');
  }

  // =============================================================
  // PROGRESS
  // =============================================================
  function updateProgress() {
    const doneCount = answered.filter(Boolean).length;
    const pct = (doneCount / ORDERED_QUESTIONS.length) * 100;
    const fill = document.querySelector('.progress-fill');
    if (fill) fill.style.width = pct + '%';
    const counter = document.querySelector('.q-counter');
    if (counter) counter.textContent = 'تم ' + doneCount + ' / ' + ORDERED_QUESTIONS.length;
  }

  // =============================================================
  // LEVEL SECTION HEADER
  // =============================================================
  function buildLevelHeader(level) {
    const meta = LEVEL_META[level];
    const correctInLevel = ORDERED_QUESTIONS
      .map((q, i) => q.level === level && userAnswers[i] === q.correct ? 1 : 0)
      .reduce((a, b) => a + b, 0);
    return `
      <div class="level-section-header lsh-${meta.cls}">
        <div class="lsh-icon">${meta.icon}</div>
        <div class="lsh-info">
          <div class="lsh-name">المستوى ${meta.label}</div>
          <div class="lsh-desc">⏱ ${meta.timeLimit} ثانية لكل سؤال • ${meta.total} سؤال</div>
        </div>
        <div class="lsh-progress-wrap">
          <div class="lsh-progress-num" style="color:${meta.color}">${correctInLevel}/${meta.total}</div>
          <div class="lsh-progress-lbl">صحيح</div>
        </div>
      </div>`;
  }

  // =============================================================
  // RENDER QUESTION
  // =============================================================
  function renderQuestion(idx) {
    stopTimer();
    const q = ORDERED_QUESTIONS[idx];
    const sel = userAnswers[idx];
    const isAnswered = answered[idx];

    // Determine if we need to show level header (first q of each level)
    const prevQ = idx > 0 ? ORDERED_QUESTIONS[idx - 1] : null;
    const showLevelHeader = !prevQ || prevQ.level !== q.level;

    const optHtml = q.options.map((opt, i) => {
      let cls = 'opt-item';
      if (isAnswered) {
        cls += ' locked';
        if (i === q.correct) cls += ' correct-ans';
        else if (i === sel) cls += ' wrong-ans';
      }
      return `
        <div class="${cls}" data-idx="${i}">
          <span class="opt-prefix">${q.type === 'tf' ? (i === 0 ? '✔' : '✖') : OPT_LABELS[i]}</span>
          <span class="opt-text">${opt}</span>
        </div>`;
    }).join('');

    const isLast = idx === ORDERED_QUESTIONS.length - 1;
    const meta = LEVEL_META[q.level];

    root.innerHTML = `
      <div class="quiz-header">
        <div class="quiz-title">🌍 محيط المعرفة</div>
        <div class="quiz-sub">اختبار الدروس الخمسة الشاملة — ${ORDERED_QUESTIONS.length} سؤال</div>
      </div>

      <div class="level-tabs">
        ${LEVELS_ORDER.map(lvl => {
          const m = LEVEL_META[lvl];
          const done = ORDERED_QUESTIONS.filter((qq, i) => qq.level === lvl && answered[i]).length;
          return `<div class="level-tab ${m.cls} ${q.level === lvl ? 'active' : ''}" data-lvl="${lvl}">
            ${m.icon} ${m.label}
            <span class="tab-badge">${done}/${m.total}</span>
          </div>`;
        }).join('')}
      </div>

      <div class="status-bar">
        <span class="q-counter">تم 0 / ${ORDERED_QUESTIONS.length}</span>
        <div class="progress-track"><div class="progress-fill"></div></div>
        <div class="timer-display" id="timerBox"><span id="timerVal">-- ث</span></div>
      </div>

      ${showLevelHeader ? buildLevelHeader(q.level) : ''}

      <div class="question-card">
        <div class="q-meta">
          <span class="lesson-badge ${LESSON_COLORS[q.lesson]}">${q.lessonName}</span>
          <span class="level-badge lvl-${meta.cls}">${meta.icon} ${meta.label}</span>
          <span class="q-num">سؤال ${idx + 1} / ${ORDERED_QUESTIONS.length}</span>
        </div>
        <div class="question-text">${q.text}</div>
        <div class="options-grid" id="optionsGrid">
          ${optHtml}
        </div>
        <div class="explanation-box ${isAnswered ? 'show' : ''}" id="expBox">
          <span class="exp-icon">${sel === q.correct ? '✅' : (sel === null || sel === -1) ? '⏰' : '❌'}</span>
          <span class="exp-text">${q.explanation}</span>
        </div>
      </div>

      <div class="nav-row">
        <button class="btn" id="prevBtn" ${idx === 0 ? 'disabled' : ''}>◀ السابق</button>
        <button class="btn ${isLast ? 'btn-finish' : 'btn-primary'}" id="nextBtn">
          ${isLast ? '🏁 إنهاء الاختبار' : 'التالي ▶'}
        </button>
      </div>
      <div class="foot-note">💡 اختر إجابتك لرؤية الشرح — يمكنك التنقل بين الأسئلة</div>
    `;

    updateProgress();
    if (!isAnswered) startTimer(q.level);
    else renderTimer();

    // Tab clicks (jump to level)
    document.querySelectorAll('.level-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const lvl = tab.dataset.lvl;
        const startIdx = LEVEL_META[lvl].startIdx;
        currentIdx = startIdx;
        renderQuestion(currentIdx);
      });
    });

    // Option clicks
    document.querySelectorAll('.opt-item').forEach(opt => {
      opt.addEventListener('click', () => {
        if (answered[currentIdx]) return;
        const i = parseInt(opt.dataset.idx);
        userAnswers[currentIdx] = i;
        answered[currentIdx] = true;
        stopTimer();
        if (i === ORDERED_QUESTIONS[currentIdx].correct) playCorrect();
        else playWrong();
        showFeedback(currentIdx, i);
        updateProgress();
        checkLevelComplete(ORDERED_QUESTIONS[currentIdx].level);
      });
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentIdx > 0) { currentIdx--; renderQuestion(currentIdx); }
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      if (achPending) return; // don't advance while achievement is showing
      if (currentIdx < ORDERED_QUESTIONS.length - 1) { currentIdx++; renderQuestion(currentIdx); }
      else { stopTimer(); playFinish(); renderReport(); }
    });
  }

  // =============================================================
  // SHOW FEEDBACK
  // =============================================================
  function showFeedback(idx, chosen) {
    const q = ORDERED_QUESTIONS[idx];
    const opts = document.querySelectorAll('.opt-item');
    opts.forEach((opt, i) => {
      opt.classList.add('locked');
      if (i === q.correct) opt.classList.add('correct-ans');
      else if (i === chosen) opt.classList.add('wrong-ans');
    });
    const expBox = document.getElementById('expBox');
    if (expBox) {
      expBox.classList.add('show');
      const icon = expBox.querySelector('.exp-icon');
      if (icon) icon.textContent = chosen === q.correct ? '✅' : chosen === -1 ? '⏰' : '❌';
    }
  }

  // =============================================================
  // CHECK IF LEVEL COMPLETE (show achievement)
  // =============================================================
  function checkLevelComplete(level) {
    if (completedLevels[level]) return;
    const meta = LEVEL_META[level];
    const levelQs = ORDERED_QUESTIONS.map((q, i) => ({ q, i })).filter(({ q }) => q.level === level);
    const allAnswered = levelQs.every(({ i }) => answered[i]);
    if (!allAnswered) return;

    completedLevels[level] = true;
    const correct = levelQs.filter(({ q, i }) => userAnswers[i] === q.correct).length;
    const total = levelQs.length;
    const pct = correct / total;

    const awards = {
      easy: {
        perfect:  { medal: '🥇', title: 'حارس البيئة!',      color: '#2ecc71' },
        great:    { medal: '🏅', title: 'مستكشف بارع!',     color: '#27ae60' },
        good:     { medal: '🎖️', title: 'طالب مجتهد!',      color: '#1abc9c' },
        ok:       { medal: '📗', title: 'أنهيت المستوى السهل!', color: '#2ecc71' },
      },
      medium: {
        perfect:  { medal: '⭐', title: 'عالم شاب متميز!',   color: '#f39c12' },
        great:    { medal: '🌟', title: 'باحث موهوب!',       color: '#e67e22' },
        good:     { medal: '📙', title: 'تقدم ممتاز!',       color: '#f39c12' },
        ok:       { medal: '📓', title: 'أنهيت المستوى المتوسط!', color: '#f39c12' },
      },
      hard: {
        perfect:  { medal: '🔥', title: 'أسد العلوم!',       color: '#e74c3c' },
        great:    { medal: '💪', title: 'محارب المعرفة!',    color: '#c0392b' },
        good:     { medal: '📕', title: 'تحدي الصعب!',       color: '#e74c3c' },
        ok:       { medal: '🎗️', title: 'أنهيت المستوى الصعب!', color: '#e74c3c' },
      },
      advanced: {
        perfect:  { medal: '💎', title: 'عبقري الأرض!',      color: '#9b59b6' },
        great:    { medal: '🏆', title: 'بطل العلوم الرفيعة!', color: '#8e44ad' },
        good:     { medal: '🎓', title: 'عقل علمي نادر!',    color: '#9b59b6' },
        ok:       { medal: '🔮', title: 'أنهيت المستوى الرفيع!', color: '#9b59b6' },
      },
    };

    const tier = pct >= 1 ? 'perfect' : pct >= 0.75 ? 'great' : pct >= 0.5 ? 'good' : 'ok';
    const award = awards[level][tier];

    const msgs = {
      easy:     { perfect: 'أجبت على كل أسئلة المستوى السهل بشكل صحيح! قاعدتك قوية جداً!', great: 'أداء رائع في المستوى السهل! استعد للتحدي القادم!', good: 'أتممت المستوى السهل بنجاح! لا تزال أمامك تحديات أكبر.', ok: 'أكملت المستوى السهل! راجع الأسئلة الخاطئة وتقدم.' },
      medium:   { perfect: 'مثالي في المستوى المتوسط! أنت تُثبت أنك عالم حقيقي!', great: 'جيد جداً في المستوى المتوسط! جاهز للمستوى الصعب؟', good: 'أتممت المستوى المتوسط! الصعب ينتظرك.', ok: 'أكملت المستوى المتوسط! المراجعة ستساعدك كثيراً.' },
      hard:     { perfect: 'لا يُصدَّق! أجبت على كل الأسئلة الصعبة! أنت أسطورة!', great: 'أداء استثنائي في المستوى الصعب! هل أنت مستعد للرفيع؟', good: 'اجتزت المستوى الصعب! تحدي الرفيع في انتظارك.', ok: 'أكملت المستوى الصعب! هذا إنجاز حقيقي!' },
      advanced: { perfect: 'مثالي مئة بالمئة في المستوى الرفيع! أنت عبقري حقيقي!', great: 'أداء مبهر في المستوى الرفيع! أنت قمة في العلوم!', good: 'أتممت المستوى الرفيع! عقلك علمي بامتياز!', ok: 'أكملت الاختبار بالكامل! هذا إنجاز يستحق الاحتفال!' },
    };

    // Show achievement overlay
    showAchievement(award, level, correct, total, msgs[level][tier]);
    // Update sidebar pip
    updatePip(level, award.medal);
    // Play fanfare
    setTimeout(() => playAchievement(level), 200);
  }

  function showAchievement(award, level, correct, total, msg) {
    achPending = level;
    const meta = LEVEL_META[level];
    document.getElementById('achMedal').textContent = award.medal;
    document.getElementById('achTitle').textContent = award.title;
    document.getElementById('achMsg').textContent = msg;
    document.getElementById('achScoreBig').textContent = correct;
    document.getElementById('achScoreSm').textContent = 'من ' + total;
    const ring = document.getElementById('achRing');
    ring.style.borderColor = meta.color;
    ring.style.color = meta.color;
    const overlay = document.getElementById('achOverlay');
    overlay.classList.add('show');
    launchConfetti(award.medal === '💎' ? 100 : 60);

    document.getElementById('achContinueBtn').onclick = () => {
      overlay.classList.remove('show');
      achPending = null;
      // Auto advance to next level if available
      const lvlIdx = LEVELS_ORDER.indexOf(level);
      if (lvlIdx < LEVELS_ORDER.length - 1) {
        const nextLvl = LEVELS_ORDER[lvlIdx + 1];
        currentIdx = LEVEL_META[nextLvl].startIdx;
      } else {
        // All levels done — go to finish
        stopTimer(); playFinish(); renderReport(); return;
      }
      renderQuestion(currentIdx);
    };
  }

  function updatePip(level, medal) {
    const pip = document.getElementById('pip-' + level);
    if (!pip) return;
    pip.classList.remove('locked');
    pip.classList.add('earned');
    pip.querySelector('.ach-pip-tooltip').textContent = LEVEL_META[level].label + ' — مكتمل ' + medal;
  }

  // =============================================================
  // CONFETTI
  // =============================================================
  function launchConfetti(count) {
    const cols = ['#FFD700','#2ecc71','#9b59b6','#e74c3c','#3498db','#f39c12','#1abc9c'];
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        const size = 7 + Math.random() * 9;
        el.style.cssText = `position:fixed;top:-10px;left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.4?'50%':'3px'};z-index:9999;pointer-events:none;animation:cFallQuiz ${2+Math.random()*2}s linear forwards`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5000);
      }, i * 20);
    }
    if (!document.getElementById('cStyleQuiz')) {
      const s = document.createElement('style');
      s.id = 'cStyleQuiz';
      s.textContent = '@keyframes cFallQuiz{from{transform:translateY(0) rotate(0);opacity:1}to{transform:translateY(110vh) rotate(720deg);opacity:0}}';
      document.head.appendChild(s);
    }
  }

  // =============================================================
  // RENDER REPORT
  // =============================================================
  function renderReport() {
    finished = true;
    stopTimer();

    let totalCorrect = 0;
    const lessonScores = {};
    for (let l = 1; l <= 5; l++) lessonScores[l] = { correct: 0, total: 0, name: '' };
    const levelScores = { easy: {c:0,t:0}, medium: {c:0,t:0}, hard: {c:0,t:0}, advanced: {c:0,t:0} };

    ORDERED_QUESTIONS.forEach((q, i) => {
      lessonScores[q.lesson].total++;
      lessonScores[q.lesson].name = q.lessonName;
      levelScores[q.level].t++;
      if (userAnswers[i] === q.correct) {
        totalCorrect++;
        lessonScores[q.lesson].correct++;
        levelScores[q.level].c++;
      }
    });

    const pct = (totalCorrect / ORDERED_QUESTIONS.length) * 100;
    const { tag, tagClass, msg } = getLevel(pct);

    const lvlCardsMedals = { easy:'🟢', medium:'🟡', hard:'🔴', advanced:'💎' };
    const lvlCardsHtml = LEVELS_ORDER.map(lvl => {
      const s = levelScores[lvl];
      const lp = s.t > 0 ? (s.c / s.t * 100) : 0;
      const achieved = completedLevels[lvl];
      return `
        <div class="lvl-report-card ${lvl}">
          <div class="lvrc-medal">${lvlCardsMedals[lvl]}</div>
          <div class="lvrc-name ${lvl}">${LEVEL_META[lvl].label}</div>
          <div class="lvrc-score" style="color:${LEVEL_META[lvl].color}">${s.c}</div>
          <div class="lvrc-total">من ${s.t}</div>
          <div class="lvrc-bar-bg"><div class="lvrc-bar ${lvl}-bar" style="width:${lp}%"></div></div>
          ${achieved ? '<div style="font-size:0.75rem;margin-top:6px;color:'+LEVEL_META[lvl].color+'">✅ إنجاز مفتوح</div>' : ''}
        </div>`;
    }).join('');

    const lessonRowsHtml = Object.entries(lessonScores).map(([l, sc]) => {
      const lp = (sc.correct / sc.total) * 100;
      const barColor = lp >= 75 ? '#2ecc71' : lp >= 50 ? '#e9c46a' : '#e74c3c';
      return `
        <div class="lesson-row">
          <span class="lesson-badge lb-${l}" style="min-width:100px;">${sc.name}</span>
          <span class="lr-name">الدرس ${l}</span>
          <span class="lr-score" style="color:${barColor}">${sc.correct}/${sc.total}</span>
          <div class="lr-bar-bg"><div class="lr-bar-fill" style="width:${lp}%;background:${barColor};"></div></div>
        </div>`;
    }).join('');

    const wrongItems = ORDERED_QUESTIONS.map((q, i) => {
      if (userAnswers[i] === q.correct) return '';
      const userAns = userAnswers[i] !== null && userAnswers[i] >= 0 ? q.options[userAnswers[i]] : '(لم يُجَب / انتهى الوقت)';
      return `
        <div class="wrong-item">
          <div class="wi-q">❓ ${q.lessonName} — ${q.text}</div>
          <div class="wi-ans">
            <span class="wi-wrong-tag">❌ إجابتك: ${userAns}</span>
            <span>|</span>
            <span class="wi-right-tag">✅ الصحيحة: ${q.options[q.correct]}</span>
          </div>
          <div class="wi-detail">💡 ${q.explanation}</div>
        </div>`;
    }).filter(Boolean).join('');

    const deg = (totalCorrect / ORDERED_QUESTIONS.length) * 360;
    const gradColor = pct >= 75 ? '#2a9d8f' : pct >= 50 ? '#e9c46a' : '#e74c3c';

    // Achievements earned
    const earnedCount = Object.keys(completedLevels).length;
    const achRow = LEVELS_ORDER.map(lvl => completedLevels[lvl] ? LEVEL_META[lvl].icon : '⬜').join(' ');

    root.innerHTML = `
      <div class="report-wrap">
        <div class="report-title">📊 تقرير الأداء النهائي</div>
        <div class="report-sub">اختبار الدروس الخمسة الشاملة</div>

        <div class="score-donut-wrap">
          <div class="score-donut" style="background: conic-gradient(${gradColor} ${deg}deg, rgba(255,255,255,0.06) 0deg);">
            <div class="score-inner">
              <span class="score-num">${totalCorrect}</span>
              <span class="score-denom">من ${ORDERED_QUESTIONS.length}</span>
            </div>
          </div>
        </div>

        <div style="text-align:center">
          <div style="font-size:1.6rem;font-weight:900;color:rgba(255,255,255,0.9);margin-bottom:6px;">${pct.toFixed(1)}%</div>
          <div class="level-tag ${tagClass}">${tag}</div>
        </div>

        <div class="encourage">${msg}</div>

        <div style="text-align:center;margin-bottom:20px;padding:14px;background:rgba(255,215,0,0.08);border-radius:16px;border:1px solid rgba(255,215,0,0.2);">
          <div style="font-size:0.85rem;color:rgba(255,215,0,0.7);margin-bottom:6px;font-weight:700;">🏅 الإنجازات المفتوحة</div>
          <div style="font-size:1.6rem;letter-spacing:4px">${achRow}</div>
          <div style="font-size:0.82rem;color:var(--muted);margin-top:4px">${earnedCount} من 4 مستويات مكتملة</div>
        </div>

        <div class="breakdown-title">🎯 أداؤك بالمستويات</div>
        <div class="level-report-grid">${lvlCardsHtml}</div>

        <div class="breakdown-title">📚 تفصيل النتيجة حسب الدرس</div>
        ${lessonRowsHtml}

        ${wrongItems ? `
        <div class="wrong-list-title">⚠️ الأسئلة التي تحتاج مراجعة (${ORDERED_QUESTIONS.length - totalCorrect} سؤال):</div>
        ${wrongItems}` : '<div style="color:#2ecc71;font-weight:800;font-size:1.1rem;margin:20px 0;text-align:center;">🎉 أحسنت! أجبت على جميع الأسئلة بشكل صحيح!</div>'}

        <button class="restart-btn" id="restartBtn">🔁 إعادة الاختبار من البداية</button>
      </div>
    `;

    document.getElementById('restartBtn').addEventListener('click', () => {
      userAnswers = new Array(ORDERED_QUESTIONS.length).fill(null);
      answered = new Array(ORDERED_QUESTIONS.length).fill(false);
      finished = false;
      completedLevels = {};
      currentIdx = 0;
      // Reset pips
      LEVELS_ORDER.forEach(lvl => {
        const pip = document.getElementById('pip-' + lvl);
        if (pip) { pip.classList.add('locked'); pip.classList.remove('earned'); }
      });
      renderQuestion(0);
    });
  }

  function getLevel(pct) {
    if (pct >= 85) return { tag: '🏆 محترف متميز', tagClass: 'lt-pro', msg: '🌟 أداء استثنائي! أنت متمكن تماماً من مادة الدروس الخمسة. استمر بهذا التفوق!' };
    if (pct >= 70) return { tag: '⭐ متقدم', tagClass: 'lt-adv', msg: '👏 أداء ممتاز! أنت قريب من القمة. راجع الأسئلة الخاطئة لتصل للكمال.' };
    if (pct >= 55) return { tag: '📘 متوسط', tagClass: 'lt-med', msg: '👍 أداء جيد! مع قليل من المراجعة والتركيز ستصل لمستوى متقدم.' };
    return { tag: '💪 مبتدئ', tagClass: 'lt-beg', msg: '🔄 لا تيأس! مراجعة الدروس الخمسة بعناية ستُحسّن نتيجتك كثيراً.' };
  }

  renderQuestion(0);
})();
