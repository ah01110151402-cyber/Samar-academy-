<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - أكاديمية سمر</title>
    <style>
        :root { --primary: #6c5ce7; --secondary: #a29bfe; --success: #00b894; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 20px; font-size: 24px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #2d3436; }
        input, select { width: 100%; padding: 12px; border: 2px solid #dfe6e9; border-radius: 10px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }
        button { width: 100%; padding: 15px; background-color: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #5b4bc4; transform: translateY(-2px); }
        #msg { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>ترحيباً ببطل الأكاديمية 🌟</h1>
    <form id="loginForm">
        <div class="input-group">
            <label>اسم البطل (الطالب):</label>
            <input type="text" id="studentName" placeholder="اكتب اسمك يا بطل" required>
        </div>
        
        <div class="input-group">
            <label>اسم الماما:</label>
            <input type="text" id="teacherName" placeholder="اسم ولي الأمر" required>
        </div>

        <div class="input-group">
            <label>رقم واتساب الماما:</label>
            <input type="tel" id="parentPhone" placeholder="01xxxxxxxxx" required>
        </div>

        <button type="submit" id="submitBtn">انطلق للدرس 🚀</button>
    </form>
    <p id="msg"></p>
</div>

<script>
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');
    
    // الرابط السحري الخاص بك
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzQRlo_oaVIfyvlo7T_D4y2-9HWtAWpJMWIXXnpeGozzQDHVWWhGSN-UsIL3Oh5BX8Q6A/exec';

    form.addEventListener('submit', e => {
        e.preventDefault();
        msg.innerHTML = "جاري التحقق من البيانات...";
        msg.style.color = "blue";
        
        const studentName = document.getElementById('studentName').value;
        const teacherName = document.getElementById('teacherName').value;
        const parentPhone = document.getElementById('parentPhone').value;

        // 1. حفظ البيانات في ذاكرة المتصفح لاستخدامها في صفحة التقييم
        localStorage.setItem('studentName', studentName);
        localStorage.setItem('teacherName', teacherName);
        localStorage.setItem('parentPhone', parentPhone);

        // 2. تجهيز البيانات لإرسالها لشيت جوجل
        const data = {
            type: 'login',
            studentName: studentName,
            teacherName: teacherName,
            parentPhone: parentPhone
        };

        // 3. إرسال البيانات
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).then(() => {
            msg.innerHTML = "تم التسجيل! جارٍ تحويلك للدرس...";
            msg.style.color = "green";
            
            // 4. التحويل لصفحة الدرس الأول (تأكد أن اسم الملف صح)
            setTimeout(() => {
                window.location.href = 'index.html'; 
            }, 1500);
            
        }).catch(err => {
            msg.innerHTML = "حدث خطأ في الاتصال، حاول مرة أخرى";
            msg.style.color = "red";
            console.error(err);
        });
    });
</script>

</body>
</html>
