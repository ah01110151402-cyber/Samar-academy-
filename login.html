<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - أكاديمية سمر</title>
    <style>
        :root { --primary: #6c5ce7; --secondary: #a29bfe; --success: #00b894; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; 
        }
        .login-card { 
            background: white; padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 90%; max-width: 400px; text-align: center; 
        }
        h1 { color: var(--primary); margin-bottom: 10px; font-size: 24px; }
        p { color: #636e72; margin-bottom: 20px; font-size: 14px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #2d3436; }
        input { 
            width: 100%; padding: 12px; border: 2px solid #dfe6e9; 
            border-radius: 10px; box-sizing: border-box; font-size: 16px; 
            transition: 0.3s; text-align: right;
        }
        input:focus { border-color: var(--primary); outline: none; }
        button { 
            width: 100%; padding: 15px; background-color: var(--primary); 
            color: white; border: none; border-radius: 10px; 
            font-size: 18px; font-weight: bold; cursor: pointer; 
            transition: 0.3s; margin-top: 10px; 
        }
        button:hover { background-color: #5b4bc4; transform: translateY(-2px); }
        #msg { margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>أكاديمية سمر التعليمية 🌟</h1>
    <p>سجل دخولك لتبدأ رحلة التعلم الممتعة</p>
    
    <form id="loginForm">
        <div class="input-group">
            <label>اسم البطل (الطالب):</label>
            <input type="text" id="studentName" placeholder="اكتب اسمك الثلاثي" required>
        </div>
        
        <div class="input-group">
            <label>اسم الماما:</label>
            <input type="text" id="teacherName" placeholder="اسم ولي الأمر" required>
        </div>

        <div class="input-group">
            <label>رقم واتساب الماما:</label>
            <input type="tel" id="parentPhone" placeholder="01xxxxxxxxx" required>
        </div>

        <button type="submit" id="submitBtn">دخول للوحة المواد 🚀</button>
    </form>
    <p id="msg"></p>
</div>

<script>
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');
    
    // الرابط السحري (الخاص بك) المربوط بجوجل شيت
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzQRlo_oaVIfyvlo7T_D4y2-9HWtAWpJMWIXXnpeGozzQDHVWWhGSN-UsIL3Oh5BX8Q6A/exec';

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // تعطيل الزر ومنع الإرسال المتكرر
        btn.disabled = true;
        msg.innerHTML = "⏳ جاري تسجيل بياناتك في الأكاديمية...";
        msg.style.color = "#0984e3";
        
        const studentName = document.getElementById('studentName').value;
        const teacherName = document.getElementById('teacherName').value;
        const parentPhone = document.getElementById('parentPhone').value;

        // 1. حفظ البيانات في ذاكرة المتصفح (عشان التقييم يعرف مين الطالب)
        localStorage.setItem('studentName', studentName);
        localStorage.setItem('teacherName', teacherName);
        localStorage.setItem('parentPhone', parentPhone);

        // 2. تجهيز البيانات لإرسالها لشيت جوجل
        const data = {
            type: 'login',
            studentName: studentName,
            teacherName: teacherName,
            parentPhone: parentPhone
        };

        // 3. إرسال البيانات (Fetch API)
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).then(() => {
            msg.innerHTML = "✅ تم التسجيل بنجاح! ننتقل الآن لاختيار المادة...";
            msg.style.color = "#00b894";
            
            // 4. التوجه لصفحة "لوحة المواد" (Dashboard)
            setTimeout(() => {
                window.location.href = 'dashboard.html'; 
            }, 1500);
            
        }).catch(err => {
            msg.innerHTML = "❌ فشل الاتصال! تأكد من الإنترنت وحاول مرة أخرى.";
            msg.style.color = "#d63031";
            btn.disabled = false;
            console.error(err);
        });
    });
</script>

</body>
</html>
